<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - SP Waffles & Cafe</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <!-- Frameworks & Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            padding: 8rem 5% 5rem;
            max-width: 1200px;
            margin: auto;
            display: none;
            /* Hidden by default for protection */
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .order-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            padding: 1.5rem;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            padding-bottom: 0.5rem;
        }

        .order-id {
            font-weight: bold;
            color: var(--primary-color);
        }

        .order-date {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .order-items {
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .order-items div {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.3rem;
        }

        .order-total {
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .status-pending {
            background: #e67e22;
            color: #fff;
        }

        .status-completed {
            background: #2ecc71;
            color: #fff;
        }

        .action-btns {
            display: flex;
            gap: 0.5rem;
        }

        .action-btns button {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-complete {
            background: #27ae60;
            color: white;
        }

        .btn-complete:hover {
            background: #2ecc71;
        }

        .btn-delete {
            background: #c0392b;
            color: white;
        }

        .btn-delete:hover {
            background: #e74c3c;
        }

        .no-orders {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            color: var(--text-muted);
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <nav class="navbar navbar-dark bg-dark fixed-top border-bottom border-secondary">
        <div class="container-fluid px-4">
            <span class="navbar-brand logo d-flex align-items-center gap-2 text-primary fw-bold">
                <i class='bx bxs-coffee-togo'></i> SP Waffles & Cafe Dashboard
            </span>
            <a href="index.html" class="btn btn-outline-light btn-sm">Back to Store</a>
        </div>
    </nav>

    <div class="admin-container container py-32" style="display: none;">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="display-6 fw-bold text-white">Order Management</h2>
            <button class="btn btn-primary d-flex align-items-center gap-2 px-4 shadow-lg" onclick="loadOrders()">
                <i class='bx bx-refresh fs-4'></i> Refresh Orders
            </button>
        </div>
        <div class="row g-4" id="orders-grid">
            <!-- Orders will be injected here -->
        </div>
    </div>

    <!-- jQuery & Bootstrap -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
</body>

</html>
