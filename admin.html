<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - SP Waffles & Cafe</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <!-- Frameworks & Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            padding: 8rem 5% 5rem;
            max-width: 1200px;
            margin: auto;
            display: none;
            /* Hidden by default for protection */
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .order-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            padding: 1.5rem;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            padding-bottom: 0.5rem;
        }

        .order-id {
            font-weight: bold;
            color: var(--primary-color);
        }

        .order-date {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .order-items {
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .order-items div {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.3rem;
        }

        .order-total {
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .status-pending {
            background: #e67e22;
            color: #fff;
        }

        .status-completed {
            background: #2ecc71;
            color: #fff;
        }

        .action-btns {
            display: flex;
            gap: 0.5rem;
        }

        .action-btns button {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-complete {
            background: #27ae60;
            color: white;
        }

        .btn-complete:hover {
            background: #2ecc71;
        }

        .btn-delete {
            background: #c0392b;
            color: white;
        }

        .btn-delete:hover {
            background: #e74c3c;
        }

        .stats-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .stats-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .stats-icon {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 1.5rem;
        }

        .no-orders {
            text-align: center;
            padding: 5rem 2rem;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <!-- Header -->
    <nav class="navbar navbar-dark bg-dark fixed-top border-bottom border-secondary">
        <div class="container-fluid px-4">
            <span class="navbar-brand logo d-flex align-items-center gap-2 text-primary fw-bold">
                <i class='bx bxs-coffee-togo'></i> SP Waffles & Cafe Dashboard
            </span>
            <a href="index.html" class="btn btn-outline-light btn-sm">Back to Store</a>
        </div>
    </nav>

    <div class="admin-container container py-32" style="display: none;">
        <div class="dashboard-header mb-5">
            <div>
                <h2 class="display-5 fw-bold text-white mb-2">Order Management</h2>
                <p class="text-muted mb-0">Track and manage your cafe orders in real-time.</p>
            </div>
            <div class="d-flex flex-column align-items-end gap-2">
                <button id="refresh-btn" class="btn btn-primary d-flex align-items-center gap-2 px-4 py-2 shadow-lg rounded-pill" onclick="loadOrders()">
                    <i class='bx bx-refresh fs-4' id="refresh-icon"></i> <span id="refresh-text">Refresh Dashboard</span>
                </button>
                <small class="text-white-50" id="last-updated">Never updated</small>
            </div>
        </div>

        <!-- Stats Overview -->
        <div class="row g-4 mb-5" id="stats-row">
            <div class="col-md-4">
                <div class="stats-card d-flex align-items-center gap-3">
                    <div class="stats-icon bg-primary bg-opacity-10 text-primary">
                        <i class='bx bx-shopping-bag'></i>
                    </div>
                    <div>
                        <p class="text-muted small mb-0">Total Orders</p>
                        <h3 class="fw-bold mb-0" id="stat-total-orders">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card d-flex align-items-center gap-3">
                    <div class="stats-icon bg-warning bg-opacity-10 text-warning">
                        <i class='bx bx-time'></i>
                    </div>
                    <div>
                        <p class="text-muted small mb-0">Pending Prep</p>
                        <h3 class="fw-bold mb-0" id="stat-pending-orders">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card d-flex align-items-center gap-3">
                    <div class="stats-icon bg-success bg-opacity-10 text-success">
                        <i class='bx bx-rupee'></i>
                    </div>
                    <div>
                        <p class="text-muted small mb-0">Total Revenue</p>
                        <h3 class="fw-bold mb-0" id="stat-total-revenue">₹0</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4" id="orders-grid">
            <!-- Orders grid injected here -->
        </div>
    </div>

    <!-- jQuery & Bootstrap -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
</body>

</html>
